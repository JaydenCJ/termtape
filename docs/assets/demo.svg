<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <!-- Terminal window frame -->
  <rect x="0" y="0" width="800" height="400" rx="10" fill="#0d1117"/>
  <rect x="0" y="0" width="800" height="34" rx="10" fill="#161b22"/>
  <rect x="0" y="24" width="800" height="10" fill="#161b22"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="17" r="6" fill="#febc2e"/>
  <circle cx="62" cy="17" r="6" fill="#28c840"/>
  <text x="400" y="21" text-anchor="middle" fill="#8b949e">termtape — a flight recorder for your terminal</text>

  <!-- Session text (captured from a real run) -->
  <g fill="#c9d1d9">
    <text x="24" y="66"><tspan fill="#7ee787">$</tspan> termtape record -- curl -sS http://127.0.0.1:5432/health</text>
    <text x="24" y="88" fill="#ffa198">curl: (7) Failed to connect to 127.0.0.1 port 5432 after 0 ms: Couldn't connect to server</text>
    <text x="24" y="110" fill="#8b949e">termtape: recorded 1 command(s) → /root/.local/share/termtape/termtape.db</text>

    <text x="24" y="154"><tspan fill="#7ee787">$</tspan> termtape search "port 5432"</text>
    <text x="24" y="176"><tspan fill="#e3b341">    #1</tspan>  <tspan fill="#8b949e">2026-07-08 04:51:32</tspan>  <tspan fill="#ffa198">[7]</tspan>  curl -sS http://127.0.0.1:5432/health</text>
    <text x="24" y="198"><tspan fill="#79c0ff">        /home/user/termtape</tspan> <tspan fill="#d2a8ff">(main)</tspan></text>
    <text x="24" y="220" fill="#8b949e">        curl: (7) Failed to connect to 127.0.0.1 &gt;&gt;port&lt;&lt; &gt;&gt;5432&lt;&lt; after 0 ms: Couldn …</text>

    <text x="24" y="264"><tspan fill="#7ee787">$</tspan> echo "export API_TOKEN=hunter2secret99" | termtape redact</text>
    <text x="24" y="286">export API_TOKEN=<tspan fill="#e3b341">[REDACTED:generic-assignment]</tspan></text>
    <text x="24" y="308" fill="#8b949e">termtape: 1 redaction(s)</text>

    <text x="24" y="352"><tspan fill="#7ee787">$</tspan> termtape mcp   <tspan fill="#8b949e"># agents can now search your terminal history over MCP</tspan></text>
  </g>
</svg>
